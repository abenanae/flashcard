  <title>Flash Cards</title>
  <style>
    :root{--bg:#f8fafc;--panel:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--primary:#0f172a;--shadow:0 14px 35px rgba(15,23,42,.08);--radius:22px;--safeTop:env(safe-area-inset-top);--safeBottom:env(safe-area-inset-bottom)}
    *{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}body{min-height:100vh;padding:calc(12px + var(--safeTop)) 14px calc(92px + var(--safeBottom))}button,input,textarea{font:inherit}button{border:0;border-radius:999px;padding:12px 16px;background:var(--primary);color:#fff;font-weight:750;cursor:pointer;min-height:44px}button.secondary{background:#e2e8f0;color:var(--text)}button.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}button.danger{background:#fee2e2;color:#991b1b}button.warning{background:#fef3c7;color:#78350f}button.success{background:#dcfce7;color:#14532d}button.blue{background:#dbeafe;color:#1d4ed8}button:disabled{opacity:.45}input[type=text],input[type=search],input[type=number],textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:#fff;color:var(--text);outline:0;min-height:44px}textarea{resize:vertical;min-height:96px;line-height:1.5}label{display:block;font-size:13px;font-weight:800;color:#334155;margin:16px 0 8px}.app{max-width:760px;margin:0 auto}.header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:4px 0 16px}.titleBlock h1{margin:0;font-size:24px;line-height:1.15;letter-spacing:-.03em}.titleBlock p{margin:4px 0 0;color:var(--muted);font-size:13px}.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin:14px 0}.heroCard{min-height:300px;display:flex;flex-direction:column;justify-content:center;align-items:stretch;text-align:center;gap:20px}.frontText{font-size:clamp(34px,11vw,64px);font-weight:850;line-height:1.05;letter-spacing:-.05em;word-break:break-word}.backText{font-size:clamp(26px,8vw,44px);font-weight:850;line-height:1.18;letter-spacing:-.03em;word-break:break-word}.exampleText{margin-top:16px;padding:14px;border-radius:18px;background:#f1f5f9;color:#334155;font-size:17px;line-height:1.55;text-align:left;white-space:pre-wrap}.noteText{margin-top:12px;color:#475569;text-align:left;white-space:pre-wrap;line-height:1.55}.imageGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-top:14px}.cardImage{width:100%;max-height:220px;object-fit:cover;border-radius:16px;border:1px solid var(--line);background:#f1f5f9}.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.row>button{flex:1 1 auto}.reviewButtons{display:grid;grid-template-columns:1fr 1fr;gap:10px}.statsGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.stat{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:14px}.stat .num{font-size:28px;font-weight:850;letter-spacing:-.04em}.stat .label{color:var(--muted);font-size:12px;font-weight:750;margin-top:3px}.tabs{position:fixed;left:0;right:0;bottom:0;padding:10px 12px calc(10px + var(--safeBottom));background:rgba(248,250,252,.92);border-top:1px solid var(--line);backdrop-filter:blur(16px);z-index:10}.tabInner{max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tab{min-height:48px;border-radius:16px;background:transparent;color:#475569;border:1px solid transparent;font-size:12px;padding:8px 4px}.tab.active{background:#0f172a;color:#fff}.empty{text-align:center;color:var(--muted);line-height:1.65;padding:32px 14px}.listItem{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;border-top:1px solid var(--line);padding:14px 0}.listItem:first-child{border-top:0}.listTitle{font-weight:850;font-size:17px;line-height:1.3;word-break:break-word}.listMeta{color:var(--muted);font-size:12px;margin-top:4px;line-height:1.45}.pill{display:inline-flex;align-items:center;border-radius:999px;background:#f1f5f9;color:#475569;font-weight:750;font-size:12px;padding:6px 9px}.notice,.okBox,.warnBox,.errorBox{border-radius:18px;padding:12px 14px;line-height:1.55;font-size:14px;white-space:pre-wrap}.notice{background:#f1f5f9;color:#334155}.okBox{background:#dcfce7;color:#14532d}.warnBox{background:#fef3c7;color:#78350f}.errorBox{background:#fee2e2;color:#991b1b}.fileInput{display:block;width:100%;border:1px dashed #94a3b8;border-radius:18px;padding:18px;background:#f8fafc;color:#334155}.small{color:var(--muted);font-size:12px;line-height:1.5}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:12px}.modalBackdrop{position:fixed;inset:0;background:rgba(15,23,42,.48);display:flex;align-items:flex-end;justify-content:center;z-index:20;padding:10px}.modal{width:min(760px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:26px;padding:18px;box-shadow:0 24px 60px rgba(15,23,42,.25)}.modalHeader{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px}.modalHeader h2{margin:0;font-size:20px;letter-spacing:-.03em}.toggleLine{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-top:1px solid var(--line)}.checkbox{width:22px;height:22px;accent-color:#0f172a}.searchBar{position:sticky;top:0;background:var(--panel);padding-bottom:10px;z-index:2}@media(min-width:620px){.reviewButtons{grid-template-columns:repeat(4,1fr)}.statsGrid{grid-template-columns:repeat(4,minmax(0,1fr))}body{padding-left:20px;padding-right:20px}}
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <script>
    const DB_NAME="personal_flashcards_v2";
    const DB_VERSION=1;
    const STORES={cards:"cards",states:"reviewStates",logs:"reviewLogs",images:"images",settings:"settings"};
    const ratingLabels={again:"もう一度",hard:"難しい",good:"正解",easy:"簡単"};
    const appState={tab:"study",cards:[],reviewStates:[],logs:[],images:[],currentCardId:null,answerVisible:false,message:null,warning:null,error:null,diagnostic:null,editorCardId:null,search:"",importResult:null,settings:{gasUrl:"",autoSyncEnabled:false,autoSyncIntervalHours:12,lastSyncAt:null}};
    let dbPromise;
    function openDb(){if(dbPromise)return dbPromise;dbPromise=new Promise((resolve,reject)=>{const req=indexedDB.open(DB_NAME,DB_VERSION);req.onupgradeneeded=()=>{const db=req.result;if(!db.objectStoreNames.contains(STORES.cards)){const s=db.createObjectStore(STORES.cards,{keyPath:"id"});s.createIndex("frontText","frontText",{unique:false});s.createIndex("updatedAt","updatedAt",{unique:false})}if(!db.objectStoreNames.contains(STORES.states)){const s=db.createObjectStore(STORES.states,{keyPath:"cardId"});s.createIndex("dueAt","dueAt",{unique:false})}if(!db.objectStoreNames.contains(STORES.logs)){const s=db.createObjectStore(STORES.logs,{keyPath:"id"});s.createIndex("cardId","cardId",{unique:false});s.createIndex("reviewedAt","reviewedAt",{unique:false})}if(!db.objectStoreNames.contains(STORES.images)){const s=db.createObjectStore(STORES.images,{keyPath:"id"});s.createIndex("cardId","cardId",{unique:false})}if(!db.objectStoreNames.contains(STORES.settings))db.createObjectStore(STORES.settings,{keyPath:"key"})};req.onsuccess=()=>resolve(req.result);req.onerror=()=>reject(req.error)});return dbPromise}
    async function getAll(storeName){const db=await openDb();return new Promise((resolve,reject)=>{const tx=db.transaction(storeName,"readonly");const req=tx.objectStore(storeName).getAll();req.onsuccess=()=>resolve(req.result||[]);req.onerror=()=>reject(req.error)})}
    async function putItem(storeName,value){const db=await openDb();return new Promise((resolve,reject)=>{const tx=db.transaction(storeName,"readwrite");tx.objectStore(storeName).put(value);tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)})}
    async function deleteItem(storeName,key){const db=await openDb();return new Promise((resolve,reject)=>{const tx=db.transaction(storeName,"readwrite");tx.objectStore(storeName).delete(key);tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)})}
    async function clearStore(storeName){const db=await openDb();return new Promise((resolve,reject)=>{const tx=db.transaction(storeName,"readwrite");tx.objectStore(storeName).clear();tx.oncomplete=()=>resolve();tx.onerror=()=>reject(tx.error)})}
    async function loadData(){const [cards,states,logs,images,settingsRows]=await Promise.all([getAll(STORES.cards),getAll(STORES.states),getAll(STORES.logs),getAll(STORES.images),getAll(STORES.settings)]);appState.cards=cards.sort((a,b)=>(a.createdAt||"").localeCompare(b.createdAt||""));appState.reviewStates=states;appState.logs=logs;appState.images=images;const saved=settingsRows.find(r=>r.key==="settings");if(saved)appState.settings={...appState.settings,...saved.value};selectNextCard()}
    const nowIso=()=>new Date().toISOString();
    const addMinutes=(d,m)=>new Date(d.getTime()+m*60000);
    const addDays=(d,n)=>new Date(d.getTime()+n*86400000);
    function startOfToday(){const d=new Date();d.setHours(0,0,0,0);return d}
    function escapeHtml(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    function normalizeText(v){return String(v??"").trim().replace(/\s+/g," ")}
    function makeId(){const raw=crypto.randomUUID?crypto.randomUUID():`${Date.now()}_${Math.random().toString(16).slice(2)}`;return String(raw).replace(/[^a-zA-Z0-9_]/g,"_")}
    async function sha256(input){const data=new TextEncoder().encode(input);const hash=await crypto.subtle.digest("SHA-256",data);return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("")}
    async function createCardId(front,back){return "card_"+(await sha256(`${normalizeText(front).toLowerCase()}::${normalizeText(back)}`)).slice(0,32)}
    async function createSourceHash(row){return (await sha256(JSON.stringify(row))).slice(0,32)}
    function parseCsv(text){const rows=[];let row=[],field="",q=false;const src=String(text||"").replace(/^\uFEFF/,"");for(let i=0;i<src.length;i++){const c=src[i],n=src[i+1];if(c==='"'){if(q&&n==='"'){field+='"';i++}else q=!q;continue}if(c===","&&!q){row.push(field);field="";continue}if((c==="\n"||c==="\r")&&!q){if(c==="\r"&&n==="\n")i++;row.push(field);rows.push(row);row=[];field="";continue}field+=c}row.push(field);rows.push(row);return rows.filter(r=>r.some(cell=>String(cell).trim()!==""))}
    function rowsToObjects(rows){if(!rows.length)return[];const headers=rows[0].map(h=>String(h||"").trim());return rows.slice(1).map((row,index)=>{const obj={__line:index+2};headers.forEach((h,i)=>obj[h]=row[i]??"");return obj})}
    function resolveImportedFields(row){const rawId=row.id??row.ID??row["カードID"]??row.cardId??row["Card ID"]??"";const japanese=row["日本語"]??row["意味"]??row["和訳"]??row["裏面"]??row.Japanese??"";const english=row["英語"]??row["単語"]??row["表面"]??row.English??"";const example=row["例文"]??row["例"]??row.sentence??row.Example??"";return{externalId:normalizeText(rawId),frontText:normalizeText(english),backText:normalizeText(japanese),exampleText:String(example??"").trim()}}
    async function createImportedCardId(fields){if(fields.externalId)return "sheet_"+(await sha256(fields.externalId)).slice(0,32);return createCardId(fields.frontText,fields.backText)}
    async function importRows(objects,sourceLabel="インポート"){let created=0,updated=0,skipped=0;const errors=[];const existingById=new Map(appState.cards.map(c=>[c.id,c]));const seen=new Set();for(const [index,row] of objects.entries()){const fields=resolveImportedFields(row);const line=row.__line||index+2;if(!fields.frontText){errors.push(`${line}行目: 英語が空です。`);continue}if(!fields.backText){errors.push(`${line}行目: 日本語が空です。`);continue}const id=await createImportedCardId(fields);if(seen.has(id)){skipped++;continue}seen.add(id);const sourceHash=await createSourceHash(fields);const existing=existingById.get(id);const timestamp=nowIso();if(existing){if(existing.sourceHash===sourceHash){skipped++;continue}const updatedCard={...existing,externalId:fields.externalId||existing.externalId||"",frontText:fields.frontText,backText:fields.backText,exampleText:fields.exampleText,sourceHash,sourceLabel,updatedAt:timestamp};await putItem(STORES.cards,updatedCard);existingById.set(id,updatedCard);updated++}else{const card={id,externalId:fields.externalId,frontText:fields.frontText,backText:fields.backText,exampleText:fields.exampleText,noteText:"",imageIds:[],suspended:false,sourceHash,sourceLabel,createdAt:timestamp,updatedAt:timestamp};const state={cardId:id,dueAt:timestamp,intervalDays:0,easeFactor:2.5,reviewCount:0,lapseCount:0,lastReviewedAt:null};await putItem(STORES.cards,card);await putItem(STORES.states,state);existingById.set(id,card);created++}}await loadData();appState.importResult={created,updated,skipped,errors};return{created,updated,skipped,errors}}
    async function importCsvFile(file){clearMessages();if(!file)return;const objects=rowsToObjects(parseCsv(await file.text()));const r=await importRows(objects,"CSV");appState.message=`インポート完了: 新規 ${r.created}件 / 更新 ${r.updated}件 / スキップ ${r.skipped}件`;render()}
    function parseGasJsonText(text){const raw=String(text||"").trim();if(!raw)throw new Error("貼り付けられたJSONが空です。");try{return JSON.parse(raw)}catch{}const m=raw.match(/^[a-zA-Z_$][\w$]*\((.*)\);?$/s);if(m){try{return JSON.parse(m[1])}catch{}}throw new Error('JSONとして読み取れませんでした。{"cards":[...]} 全体を貼り付けてください。')}
    function normalizeGasRows(payload){if(typeof payload==="string")payload=parseGasJsonText(payload);if(payload&&payload.error)throw new Error(`GASエラー: ${payload.error}`);const rows=Array.isArray(payload)?payload:payload?.cards||payload?.rows||payload?.data||[];if(!Array.isArray(rows))throw new Error("GASのレスポンス形式が不正です。配列、または { cards: [...] } を返してください。");return rows.map((row,index)=>({...row,__line:row.__line||index+2}))}
    function normalizeGasUrl(url){const raw=String(url||"").trim();if(!raw)throw new Error("GAS WebアプリURLが空です。");let parsed;try{parsed=new URL(raw)}catch{throw new Error("GAS WebアプリURLの形式が不正です。https://script.google.com/macros/s/.../exec の形にしてください。")}if(parsed.protocol!=="https:")throw new Error("GAS WebアプリURLは https:// で始まる必要があります。");if(!/script\.google\.com$/.test(parsed.hostname)&&!/googleusercontent\.com$/.test(parsed.hostname))throw new Error("GAS WebアプリURLではない可能性があります。script.google.com の /exec URLを貼ってください。");if(!parsed.pathname.includes("/exec"))throw new Error("/dev URLではなく、デプロイ後に表示される /exec URLを貼ってください。");return parsed.toString()}
    async function fetchGasRowsViaFetch(url,timeoutMs=15000){const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),timeoutMs);try{const target=new URL(url);target.searchParams.set("mode","json");target.searchParams.set("t",Date.now().toString());const res=await fetch(target.toString(),{method:"GET",cache:"no-store",signal:controller.signal,redirect:"follow"});const text=await res.text();if(!res.ok)throw new Error(`HTTP ${res.status}: ${text.slice(0,200)}`);return normalizeGasRows(parseGasJsonText(text))}finally{clearTimeout(timer)}}
    async function fetchGasRowsViaJsonp(url,timeoutMs=15000){return new Promise((resolve,reject)=>{let done=false;const callbackName="flashcardsGasCallback_"+makeId();const script=document.createElement("script");const timer=setTimeout(()=>{if(done)return;done=true;cleanup();reject(new Error("JSONPがタイムアウトしました。JSON貼り付け同期を使ってください。"))},timeoutMs);function cleanup(){clearTimeout(timer);try{delete window[callbackName]}catch{window[callbackName]=undefined}script.remove()}window[callbackName]=data=>{if(done)return;done=true;cleanup();try{resolve(normalizeGasRows(data))}catch(e){reject(e)}};let target;try{target=new URL(url)}catch(e){cleanup();reject(e);return}target.searchParams.set("callback",callbackName);target.searchParams.set("t",Date.now().toString());script.src=target.toString();script.async=true;script.onerror=()=>{if(done)return;done=true;cleanup();reject(new Error("JSONP script読み込みに失敗しました。JSON貼り付け同期を使ってください。"))};document.body.appendChild(script)})}
    async function fetchGasRows(url){const normalized=normalizeGasUrl(url);const attempts=[];try{return await fetchGasRowsViaFetch(normalized)}catch(e){attempts.push(`fetch失敗: ${e.message||e}`)}try{return await fetchGasRowsViaJsonp(normalized)}catch(e){attempts.push(`JSONP失敗: ${e.message||e}`)}throw new Error(["GASへの直接接続に失敗しました。",attempts.join("\n"),"確実な反映方法: 『GAS URLを開く』→ JSONコピー → 『JSON貼り付け同期』。"].join("\n\n"))}
    function buildGasUrlWithJsonMode(url){const target=new URL(normalizeGasUrl(url));target.searchParams.set("mode","json");target.searchParams.set("t",Date.now().toString());return target.toString()}
    async function saveSyncSettings(){clearMessages();const gasUrl=document.getElementById("gasUrl")?.value.trim()||"";const autoSyncEnabled=!!document.getElementById("autoSyncEnabled")?.checked;const autoSyncIntervalHours=Math.max(1,Number(document.getElementById("autoSyncIntervalHours")?.value||12));try{const normalizedUrl=gasUrl?normalizeGasUrl(gasUrl):"";appState.settings={...appState.settings,gasUrl:normalizedUrl,autoSyncEnabled,autoSyncIntervalHours};await putItem(STORES.settings,{key:"settings",value:appState.settings});appState.message="同期設定を保存しました。"}catch(e){appState.error=String(e.message||e)}render()}
    async function syncFromGas(isAuto=false){clearMessages();const inputUrl=document.getElementById("gasUrl")?.value.trim()||appState.settings.gasUrl;if(!inputUrl){appState.error="GAS WebアプリURLを設定してください。";render();return}try{const normalizedUrl=normalizeGasUrl(inputUrl);const rows=await fetchGasRows(normalizedUrl);const r=await importRows(rows,"Google Spreadsheet / GAS");appState.settings={...appState.settings,gasUrl:normalizedUrl,lastSyncAt:nowIso()};await putItem(STORES.settings,{key:"settings",value:appState.settings});appState.message=`${isAuto?"自動":"手動"}同期完了: 新規 ${r.created}件 / 更新 ${r.updated}件 / スキップ ${r.skipped}件`}catch(e){console.error(e);appState.warning=String(e.message||e)}await loadData();render()}
    async function syncFromPastedGasJson(){clearMessages();const text=document.getElementById("gasJsonPaste")?.value||"";try{const rows=normalizeGasRows(parseGasJsonText(text));const r=await importRows(rows,"Google Spreadsheet / GAS JSON Paste");appState.settings={...appState.settings,lastSyncAt:nowIso()};await putItem(STORES.settings,{key:"settings",value:appState.settings});appState.message=`貼り付けJSON同期完了: 新規 ${r.created}件 / 更新 ${r.updated}件 / スキップ ${r.skipped}件`}catch(e){appState.error=`貼り付けJSONの同期に失敗しました。\n${e.message||e}`}render()}
    async function maybeAutoSyncFromGas(){const{gasUrl,autoSyncEnabled,autoSyncIntervalHours,lastSyncAt}=appState.settings;if(!gasUrl||!autoSyncEnabled)return;const intervalMs=Math.max(1,Number(autoSyncIntervalHours||12))*3600000;const lastMs=lastSyncAt?new Date(lastSyncAt).getTime():0;if(!lastMs||Date.now()-lastMs>=intervalMs)await syncFromGas(true)}
    async function testGasConnection(){clearMessages();const inputUrl=document.getElementById("gasUrl")?.value.trim()||appState.settings.gasUrl||"";try{const rows=await fetchGasRows(normalizeGasUrl(inputUrl));appState.diagnostic=["GAS直接接続テスト: 成功",`取得行数: ${rows.length}`,rows[0]?`1行目: ${JSON.stringify(rows[0])}`:"1行目: なし"].join("\n");appState.message="GAS直接接続テストに成功しました。"}catch(e){appState.diagnostic=["GAS直接接続テスト: 失敗",String(e.message||e),"","JSON貼り付け同期でも反映できます。"].join("\n");appState.warning="直接接続に失敗しました。JSON貼り付け同期を使うと反映できます。"}render()}
    function openGasUrlForCheck(){clearMessages();const inputUrl=document.getElementById("gasUrl")?.value.trim()||appState.settings.gasUrl||"";try{window.open(buildGasUrlWithJsonMode(inputUrl),"_blank","noopener,noreferrer");appState.message="GAS URLを開きました。表示されたJSONをコピーできます。"}catch(e){appState.error=String(e.message||e)}render()}
    async function copyGasUrl(){clearMessages();const inputUrl=document.getElementById("gasUrl")?.value.trim()||appState.settings.gasUrl||"";try{await navigator.clipboard.writeText(buildGasUrlWithJsonMode(inputUrl));appState.message="JSON確認用URLをコピーしました。"}catch(e){appState.error=`URLコピーに失敗しました。${e.message||e}`}render()}
    function getReviewState(cardId){return appState.reviewStates.find(s=>s.cardId===cardId)||{cardId,dueAt:nowIso(),intervalDays:0,easeFactor:2.5,reviewCount:0,lapseCount:0,lastReviewedAt:null}}
    function isDue(state){return new Date(state.dueAt).getTime()<=Date.now()}
    function dueCards(){return appState.cards.filter(c=>!c.suspended).map(card=>({card,state:getReviewState(card.id)})).filter(({state})=>isDue(state)).sort((a,b)=>{const an=a.state.reviewCount===0?1:0,bn=b.state.reviewCount===0?1:0;if(an!==bn)return an-bn;return new Date(a.state.dueAt)-new Date(b.state.dueAt)}).map(({card})=>card)}
    function selectNextCard(){const due=dueCards();const ok=due.some(c=>c.id===appState.currentCardId);if(!ok)appState.currentCardId=due[0]?.id||null;appState.answerVisible=false}
    function currentCard(){return appState.cards.find(c=>c.id===appState.currentCardId)||null}
    function calculateNextReview(state,rating){const now=new Date();let intervalDays=Number(state.intervalDays||0),easeFactor=Number(state.easeFactor||2.5),lapseCount=Number(state.lapseCount||0),dueAt;if(rating==="again"){intervalDays=0;easeFactor=Math.max(1.3,easeFactor-.2);lapseCount++;dueAt=addMinutes(now,10)}if(rating==="hard"){intervalDays=intervalDays===0?1:Math.max(1,Math.round(intervalDays*1.2));easeFactor=Math.max(1.3,easeFactor-.15);dueAt=addDays(now,intervalDays)}if(rating==="good"){intervalDays=intervalDays===0?2:Math.max(2,Math.round(intervalDays*easeFactor));dueAt=addDays(now,intervalDays)}if(rating==="easy"){intervalDays=intervalDays===0?4:Math.max(4,Math.round(intervalDays*easeFactor*1.4));easeFactor=Math.min(3.4,easeFactor+.15);dueAt=addDays(now,intervalDays)}return{cardId:state.cardId,dueAt:dueAt.toISOString(),intervalDays,easeFactor,reviewCount:Number(state.reviewCount||0)+1,lapseCount,lastReviewedAt:now.toISOString()}}
    async function rateCurrentCard(rating){const card=currentCard();if(!card)return;const oldState=getReviewState(card.id);const newState=calculateNextReview(oldState,rating);const log={id:makeId(),cardId:card.id,reviewedAt:nowIso(),rating,previousIntervalDays:oldState.intervalDays||0,nextIntervalDays:newState.intervalDays||0};await putItem(STORES.states,newState);await putItem(STORES.logs,log);await loadData();appState.message=`${ratingLabels[rating]}: 次回は${rating==="again"?"10分後":`${newState.intervalDays}日後`}`;render()}
    function todayLogs(){const start=startOfToday().getTime();return appState.logs.filter(log=>new Date(log.reviewedAt).getTime()>=start)}
    function stats(){const activeCards=appState.cards.filter(c=>!c.suspended).length;return{activeCards,suspendedCards:appState.cards.filter(c=>c.suspended).length,due:dueCards().length,reviewedToday:todayLogs().length,newCards:appState.reviewStates.filter(s=>(s.reviewCount||0)===0).length,total:appState.cards.length}}
    function cardImages(card,side){const ids=new Set(card.imageIds||[]);return appState.images.filter(img=>ids.has(img.id)&&(!side||img.side===side))}
    function imageUrl(img){return URL.createObjectURL(img.blob)}
    function clearMessages(){appState.message=null;appState.warning=null;appState.error=null;appState.importResult=null;appState.diagnostic=null}
    function setTab(tab){appState.tab=tab;appState.editorCardId=null;clearMessages();selectNextCard();render()}
    async function saveCardFromEditor(cardId){const card=appState.cards.find(c=>c.id===cardId);if(!card)return;const updated={...card,frontText:normalizeText(document.getElementById("editFront").value),backText:normalizeText(document.getElementById("editBack").value),exampleText:document.getElementById("editExample").value.trim(),noteText:document.getElementById("editNote").value.trim(),suspended:document.getElementById("editSuspended").checked,updatedAt:nowIso()};if(!updated.frontText||!updated.backText){appState.error="表面テキストと裏面テキストは必須です。";render();return}await putItem(STORES.cards,updated);await loadData();appState.editorCardId=null;appState.message="カードを保存しました。";render()}
    async function addImageToCard(cardId,input,side){const file=input.files&&input.files[0];if(!file)return;const card=appState.cards.find(c=>c.id===cardId);if(!card)return;if(!file.type.startsWith("image/")){appState.error="画像ファイルを選択してください。";render();return}const image={id:"img_"+makeId(),cardId,blob:file,side,name:file.name,type:file.type,createdAt:nowIso()};await putItem(STORES.images,image);await putItem(STORES.cards,{...card,imageIds:[...(card.imageIds||[]),image.id],updatedAt:nowIso()});await loadData();appState.editorCardId=cardId;appState.message="画像を追加しました。";render()}
    async function removeImage(cardId,imageId){const card=appState.cards.find(c=>c.id===cardId);if(!card)return;await putItem(STORES.cards,{...card,imageIds:(card.imageIds||[]).filter(id=>id!==imageId),updatedAt:nowIso()});await deleteItem(STORES.images,imageId);await loadData();appState.editorCardId=cardId;appState.message="画像を削除しました。";render()}
    async function deleteCard(cardId){if(!confirm("このカードを削除しますか？ 学習履歴と画像も削除されます。"))return;for(const log of appState.logs.filter(l=>l.cardId===cardId))await deleteItem(STORES.logs,log.id);for(const img of appState.images.filter(i=>i.cardId===cardId))await deleteItem(STORES.images,img.id);await deleteItem(STORES.cards,cardId);await deleteItem(STORES.states,cardId);await loadData();appState.editorCardId=null;appState.message="カードを削除しました。";render()}
    async function resetAllData(){if(!confirm("すべてのカード、画像、学習履歴を削除しますか？"))return;await Promise.all([clearStore(STORES.cards),clearStore(STORES.states),clearStore(STORES.logs),clearStore(STORES.images)]);await loadData();appState.message="すべてのデータを削除しました。";render()}
    function exportData(){const payload={exportedAt:nowIso(),cards:appState.cards.map(c=>({...c})),reviewStates:appState.reviewStates,logs:appState.logs,note:"画像Blobはこの簡易JSONバックアップには含まれません。"};const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`flashcards-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url)}
    function runSelfTests(){const tests=[];const assert=(name,cond,detail="")=>tests.push({name,ok:!!cond,detail});try{const rows=parseCsv('id,日本語,英語,例文\n001,"切羽,詰まった",hard-pressed,"a, b"');assert("CSV parser handles quoted commas",rows[1][1]==="切羽,詰まった"&&rows[1][3]==="a, b",JSON.stringify(rows));const objects=rowsToObjects(rows);assert("rowsToObjects maps Japanese headers",objects[0]["日本語"]==="切羽,詰まった",JSON.stringify(objects[0]));const fields=resolveImportedFields({id:"001",日本語:"意味",英語:"word",例文:"sentence"});assert("resolveImportedFields maps expected columns",fields.externalId==="001"&&fields.frontText==="word"&&fields.backText==="意味",JSON.stringify(fields));const gasRows=normalizeGasRows({cards:[{id:"001",日本語:"意味",英語:"word"}]});assert("normalizeGasRows accepts { cards: [...] }",gasRows.length===1&&gasRows[0].__line===2,JSON.stringify(gasRows));const pastedRows=normalizeGasRows('{"cards":[{"id":"002","日本語":"勉強になる","英語":"enlightening"}]}');assert("normalizeGasRows accepts pasted JSON text",pastedRows.length===1&&pastedRows[0].id==="002",JSON.stringify(pastedRows));const jsonpRows=normalizeGasRows('callbackName({"cards":[{"id":"003","日本語":"凝縮する","英語":"condense"}]});');assert("normalizeGasRows accepts pasted JSONP text",jsonpRows.length===1&&jsonpRows[0].id==="003",JSON.stringify(jsonpRows));assert("GAS URL validator accepts /exec",normalizeGasUrl("https://script.google.com/macros/s/abc/exec").includes("/exec"));let rejected=false;try{normalizeGasUrl("https://script.google.com/macros/s/abc/dev")}catch{rejected=true}assert("GAS URL validator rejects /dev",rejected);assert("buildGasUrlWithJsonMode appends mode=json",buildGasUrlWithJsonMode("https://script.google.com/macros/s/abc/exec").includes("mode=json"))}catch(e){tests.push({name:"Self-test crashed",ok:false,detail:String(e.message||e)})}const pass=tests.filter(t=>t.ok).length;appState.diagnostic=tests.map(t=>`${t.ok?"OK":"NG"}: ${t.name}${t.detail?`\n  ${t.detail}`:""}`).join("\n")+`\n\n${pass}/${tests.length} passed`;appState.message=pass===tests.length?"内蔵テストはすべて成功しました。":"内蔵テストに失敗があります。";if(pass!==tests.length)appState.error="内蔵テストの失敗を確認してください。";render()}
    function formatDateTime(value){if(!value)return"未設定";const d=new Date(value);if(Number.isNaN(d.getTime()))return"未設定";return d.toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}
    function renderAppHeader(){const s=stats();return`<div class="header"><div class="titleBlock"><h1>Flash Cards</h1><p>英語を表面、日本語と例文を裏面に表示</p></div><span class="pill">期限 ${s.due}</span></div>`}
    function renderMessages(){let html="";if(appState.message)html+=`<div class="okBox">${escapeHtml(appState.message)}</div>`;if(appState.warning)html+=`<div class="warnBox">${escapeHtml(appState.warning)}</div>`;if(appState.error)html+=`<div class="errorBox">${escapeHtml(appState.error)}</div>`;if(appState.importResult?.errors?.length)html+=`<div class="errorBox">${escapeHtml(appState.importResult.errors.join("\n"))}</div>`;if(appState.diagnostic)html+=`<pre class="notice mono" style="overflow:auto; white-space:pre-wrap;">${escapeHtml(appState.diagnostic)}</pre>`;return html}
    function renderStudy(){const card=currentCard();const s=stats();if(!appState.cards.length)return`<div class="card empty"><strong>カードがありません。</strong><br>まず「インポート」からカードを読み込んでください。</div>`;if(!card)return`<div class="card empty"><strong>今日の復習はありません。</strong><br>現在の有効カード: ${s.activeCards}枚</div>${renderStatsCard()}`;const state=getReviewState(card.id);const imageHtml=images=>images.length?`<div class="imageGrid">${images.map(img=>`<img class="cardImage" src="${imageUrl(img)}" alt="${escapeHtml(img.name||"カード画像")}">`).join("")}</div>`:"";return`<div class="card heroCard"><div><div class="frontText">${escapeHtml(card.frontText)}</div>${imageHtml(cardImages(card,"front"))}</div>${appState.answerVisible?`<div><div class="backText">${escapeHtml(card.backText)}</div>${card.exampleText?`<div class="exampleText"><strong>例文</strong><br>${escapeHtml(card.exampleText)}</div>`:""}${card.noteText?`<div class="noteText"><strong>メモ</strong><br>${escapeHtml(card.noteText)}</div>`:""}${imageHtml(cardImages(card,"back"))}</div>`:""}${appState.answerVisible?`<div class="reviewButtons"><button class="danger" onclick="rateCurrentCard('again')">もう一度</button><button class="warning" onclick="rateCurrentCard('hard')">難しい</button><button class="success" onclick="rateCurrentCard('good')">正解</button><button class="blue" onclick="rateCurrentCard('easy')">簡単</button></div>`:`<button onclick="appState.answerVisible=true;render();">裏面を表示</button>`}</div><div class="card"><div class="row"><span class="pill">復習回数 ${state.reviewCount||0}</span><span class="pill">間隔 ${state.intervalDays||0}日</span><span class="pill">次回 ${formatDateTime(state.dueAt)}</span></div><div class="row" style="margin-top:12px"><button class="ghost" onclick="openEditor('${card.id}')">このカードを編集</button><button class="secondary" onclick="skipCurrentCard()">今はスキップ</button></div></div>${renderStatsCard()}`}
    function skipCurrentCard(){const due=dueCards();if(due.length<=1)return;const idx=due.findIndex(c=>c.id===appState.currentCardId);appState.currentCardId=due[(idx+1)%due.length].id;appState.answerVisible=false;render()}
    function renderStatsCard(){const s=stats();return`<div class="card"><div class="statsGrid"><div class="stat"><div class="num">${s.due}</div><div class="label">今日の対象</div></div><div class="stat"><div class="num">${s.reviewedToday}</div><div class="label">今日の学習</div></div><div class="stat"><div class="num">${s.activeCards}</div><div class="label">有効カード</div></div><div class="stat"><div class="num">${s.newCards}</div><div class="label">未学習</div></div></div></div>`}
    function renderImport(){return`<div class="card"><h2 style="margin:0 0 10px;letter-spacing:-.03em">Google Spreadsheet 同期</h2><div class="notice">GitHub PagesなどのHTTPS公開環境では直接同期を試せます。失敗した場合はJSON貼り付け同期で反映できます。<br>対応列: <strong>id</strong>任意, <strong>日本語</strong>, <strong>英語</strong>, <strong>例文</strong></div><label for="gasUrl">GAS WebアプリURL</label><input id="gasUrl" type="text" placeholder="https://script.google.com/macros/s/.../exec" value="${escapeHtml(appState.settings.gasUrl||"")}"/><div class="toggleLine"><div><strong>アプリ起動時に直接同期を試す</strong><div class="small">直接同期がブロックされる環境では警告だけ表示します。</div></div><input id="autoSyncEnabled" class="checkbox" type="checkbox" ${appState.settings.autoSyncEnabled?"checked":""}/></div><label for="autoSyncIntervalHours">自動同期を試す間隔（時間）</label><input id="autoSyncIntervalHours" type="number" inputmode="numeric" value="${escapeHtml(appState.settings.autoSyncIntervalHours||12)}"/><p class="small">最終同期: ${appState.settings.lastSyncAt?formatDateTime(appState.settings.lastSyncAt):"未同期"}</p><div class="row"><button onclick="saveSyncSettings()">同期設定を保存</button><button class="blue" onclick="saveSyncSettings().then(()=>syncFromGas(false))">直接同期を試す</button><button class="ghost" onclick="testGasConnection()">接続テスト</button><button class="secondary" onclick="openGasUrlForCheck()">GAS URLを開く</button><button class="secondary" onclick="copyGasUrl()">URLをコピー</button></div></div><div class="card"><h2 style="margin:0 0 10px;letter-spacing:-.03em">JSON貼り付け同期</h2><div class="notice">直接同期が失敗する場合の確実な反映方法です。GAS URLを開いて表示されたJSON全体をここに貼ってください。</div><label for="gasJsonPaste">GASで表示されたJSON</label><textarea id="gasJsonPaste" placeholder='{"cards":[{"id":"001","日本語":"切羽詰まった","英語":"hard-pressed","例文":"..."}]}'></textarea><button class="blue" onclick="syncFromPastedGasJson()">貼り付けJSONを同期</button></div><div class="card"><h2 style="margin:0 0 10px;letter-spacing:-.03em">CSVインポート</h2><div class="notice">CSVファイルからの手動追加も使えます。対応列: <strong>id</strong>任意, <strong>日本語</strong>, <strong>英語</strong>, <strong>例文</strong></div><label for="csvFile">CSVファイル</label><input id="csvFile" class="fileInput" type="file" accept=".csv,text/csv" onchange="importCsvFile(this.files[0])"/></div><div class="card"><h3 style="margin-top:0">テスト</h3><button class="ghost" onclick="runSelfTests()">内蔵テストを実行</button></div><div class="card"><h3 style="margin-top:0">Spreadsheet / CSV例</h3><pre class="notice mono" style="overflow:auto;white-space:pre-wrap;">id,日本語,英語,例文\n001,切羽詰まった,hard-pressed,you will be hard-pressed to find anything cheaper in this location.\n002,勉強になる,enlightening,I'm glad that you found it enlightening</pre></div>`}
    function filteredCards(){const q=normalizeText(appState.search).toLowerCase();let cards=[...appState.cards];if(q)cards=cards.filter(card=>[card.frontText,card.backText,card.exampleText,card.noteText].some(v=>String(v||"").toLowerCase().includes(q)));return cards.sort((a,b)=>a.frontText.localeCompare(b.frontText))}
    function renderCards(){const cards=filteredCards();if(!appState.cards.length)return`<div class="card empty">カードがありません。インポートから読み込んでください。</div>`;return`<div class="card"><div class="searchBar"><input type="search" placeholder="カードを検索" value="${escapeHtml(appState.search)}" oninput="appState.search=this.value;render();"/></div>${cards.length?cards.map(renderCardListItem).join(""):`<div class="empty">該当するカードがありません。</div>`}</div>`}
    function renderCardListItem(card){const state=getReviewState(card.id);return`<div class="listItem"><div><div class="listTitle">${escapeHtml(card.frontText)}</div><div class="listMeta">${escapeHtml(card.backText)}${card.exampleText?`<br>例文: ${escapeHtml(card.exampleText.slice(0,80))}${card.exampleText.length>80?"...":""}`:""}<br>次回: ${formatDateTime(state.dueAt)} / 復習 ${state.reviewCount||0}回 / 画像 ${(card.imageIds||[]).length}枚${card.suspended?`<br><strong>一時停止中</strong>`:""}</div></div><button class="ghost" onclick="openEditor('${card.id}')">編集</button></div>`}
    function openEditor(id){appState.editorCardId=id;render()}function closeEditor(){appState.editorCardId=null;render()}
    function renderEditor(){const card=appState.cards.find(c=>c.id===appState.editorCardId);if(!card)return"";const imageRows=images=>images.map(img=>`<div class="listItem"><div><img class="cardImage" style="max-height:120px" src="${imageUrl(img)}" alt="${escapeHtml(img.name||"画像")}"/><div class="listMeta">${escapeHtml(img.name||"画像")} / ${img.side==="front"?"表面":"裏面"}</div></div><button class="danger" onclick="removeImage('${card.id}','${img.id}')">削除</button></div>`).join("");const frontImages=cardImages(card,"front"),backImages=cardImages(card,"back");return`<div class="modalBackdrop" onclick="if(event.target.className==='modalBackdrop')closeEditor();"><div class="modal"><div class="modalHeader"><h2>カード編集</h2><button class="secondary" onclick="closeEditor()">閉じる</button></div><label>表面テキスト（英語）</label><input id="editFront" type="text" value="${escapeHtml(card.frontText)}"/><label>裏面テキスト（日本語）</label><input id="editBack" type="text" value="${escapeHtml(card.backText)}"/><label>例文（裏面に表示）</label><textarea id="editExample">${escapeHtml(card.exampleText||"")}</textarea><label>補足メモ（裏面に表示）</label><textarea id="editNote">${escapeHtml(card.noteText||"")}</textarea><div class="toggleLine"><div><strong>一時停止</strong><div class="small">オンにすると学習対象から外します。</div></div><input id="editSuspended" class="checkbox" type="checkbox" ${card.suspended?"checked":""}/></div><div class="row" style="margin:12px 0 18px"><button onclick="saveCardFromEditor('${card.id}')">保存</button><button class="danger" onclick="deleteCard('${card.id}')">削除</button></div><div class="card" style="box-shadow:none;margin:12px 0"><h3 style="margin-top:0">画像</h3><label>表面に画像を追加</label><input class="fileInput" type="file" accept="image/*" onchange="addImageToCard('${card.id}',this,'front')"/><label>裏面に画像を追加</label><input class="fileInput" type="file" accept="image/*" onchange="addImageToCard('${card.id}',this,'back')"/><h4>表面画像</h4>${frontImages.length?imageRows(frontImages):`<p class="small">表面画像はありません。</p>`}<h4>裏面画像</h4>${backImages.length?imageRows(backImages):`<p class="small">裏面画像はありません。</p>`}</div></div></div>`}
    function renderHistory(){const logs=[...appState.logs].sort((a,b)=>new Date(b.reviewedAt)-new Date(a.reviewedAt)).slice(0,100);return`${renderStatsCard()}<div class="card"><h2 style="margin-top:0">学習履歴</h2>${logs.length?logs.map(log=>{const card=appState.cards.find(c=>c.id===log.cardId);return`<div class="listItem"><div><div class="listTitle">${escapeHtml(card?.frontText||"削除済みカード")}</div><div class="listMeta">${formatDateTime(log.reviewedAt)} / ${ratingLabels[log.rating]||log.rating}<br>間隔: ${log.previousIntervalDays||0}日 → ${log.nextIntervalDays||0}日</div></div></div>`}).join(""):`<div class="empty">履歴はまだありません。</div>`}</div><div class="card"><h2 style="margin-top:0">データ管理</h2><p class="small">学習データはこのiPhone内のブラウザデータとして保存されます。</p><div class="row"><button class="ghost" onclick="exportData()">JSONバックアップ</button><button class="danger" onclick="resetAllData()">全データ削除</button></div></div>`}
    function renderTabs(){const tabs=[["study","学習"],["import","インポート"],["cards","カード"],["history","履歴"]];return`<div class="tabs"><div class="tabInner">${tabs.map(([k,l])=>`<button class="tab ${appState.tab===k?"active":""}" onclick="setTab('${k}')">${l}</button>`).join("")}</div></div>`}
    function render(){const root=document.getElementById("app");let main="";if(appState.tab==="study")main=renderStudy();if(appState.tab==="import")main=renderImport();if(appState.tab==="cards")main=renderCards();if(appState.tab==="history")main=renderHistory();root.innerHTML=`${renderAppHeader()}${renderMessages()}${main}${renderEditor()}${renderTabs()}`}
    Object.assign(window,{appState,render,setTab,importCsvFile,saveSyncSettings,syncFromGas,testGasConnection,openGasUrlForCheck,copyGasUrl,syncFromPastedGasJson,runSelfTests,rateCurrentCard,skipCurrentCard,openEditor,closeEditor,saveCardFromEditor,addImageToCard,removeImage,deleteCard,resetAllData,exportData});
    if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(err=>console.warn("Service Worker registration failed:",err)))}
    loadData().then(async()=>{render();await maybeAutoSyncFromGas()}).catch(err=>{console.error(err);appState.error="データベースの初期化に失敗しました。ブラウザのIndexedDBが利用可能か確認してください。";render()});
  </script>
