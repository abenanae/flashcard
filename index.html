10px;z-index:2}@keyframes celebratePop{from{transform:translateY(10px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}@media(min-width:620px){.reviewButtons{grid-template-columns:repeat(4,1fr)}.statsGrid{grid-template-columns:repeat(4,minmax(0,1fr))}body{padding-left:20px;padding-right:20px}}

<body>
  <div id="app" class="app"><div class="card empty"><strong>読み込み中です。</strong></div></div>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    window.addEventListener("error",event=>{
      if(!event.message)return;
      const root=document.getElementById("app");
      if(!root)return;
      root.textContent="";
      const box=document.createElement("div");
      box.className="card errorBox";
      box.textContent=`アプリの読み込みに失敗しました。\n${String(event.message||event.error||"Unknown error")}`;
      root.appendChild(box);
    });
    window.addEventListener("unhandledrejection",event=>{
      const root=document.getElementById("app");
      if(!root)return;
      const reason=event.reason?.message||event.reason||"Unknown error";
      root.textContent="";
      const box=document.createElement("div");
      box.className="card errorBox";
      box.textContent=`アプリの読み込みに失敗しました。\n${String(reason)}`;
      root.appendChild(box);
    });
    const DB_NAME="personal_flashcards_v2";
    const DB_VERSION=3;
    const STORES={cards:"cards",states:"reviewStates",logs:"reviewLogs",images:"images",settings:"settings",completions:"dailyCompletions",tombstones:"syncTombstones"};
    const DRIVE_SYNC_FILE_NAME="flashcards-sync.json";
    const DRIVE_SYNC_SCOPE="https://www.googleapis.com/auth/drive.appdata";
    const SYNC_COLLECTIONS=[
      {store:STORES.cards,collection:"cards",key:"id"},
      {store:STORES.states,collection:"reviewStates",key:"cardId"},
      {store:STORES.logs,collection:"reviewLogs",key:"id"},
      {store:STORES.completions,collection:"dailyCompletions",key:"dateKey"},
      {store:STORES.images,collection:"images",key:"id"}
    ];
    const ratingLabels={again:"もう一度",hard:"難しい",good:"正解",easy:"簡単"};
    const praiseWords=["すごい！","かっこいい！","ワンダフル！","最高！"];
    const appState={
      tab:"study",
      cards:[],
      reviewStates:[],
      logs:[],
      images:[],
      dailyCompletions:[],
      tombstones:[],
      currentCardId:null,
      answerVisible:false,
      message:null,
      warning:null,
      error:null,
      diagnostic:null,
      editorCardId:null,
      search:"",
      importResult:null,
      completionModalState:null,
      sessionReviewedCount:0,
      streakDays:0,
      settings:{gasUrl:"",autoSyncEnabled:false,autoSyncIntervalHours:12,lastSyncAt:null,nickname:"",nicknameUpdatedAt:null,googleDriveClientId:"",googleDriveAutoSyncEnabled:true,googleDriveAutoSyncIntervalMinutes:5,googleDriveLastSyncAt:null}
    };
    let dbPromise;
    let googleDriveAccessToken="";
    let googleDriveTokenExpiresAt=0;
    let googleDriveAutoSyncTimer=null;
    let googleDriveSyncInFlight=false;
    let googleDriveSyncQueued=false;

    function openDb(){
      if(dbPromise)return dbPromise;
      dbPromise=new Promise((resolve,reject)=>{
        let blockedTimer;
        const req=indexedDB.open(DB_NAME,DB_VERSION);
        req.onblocked=()=>{
          clearTimeout(blockedTimer);
          dbPromise=null;
          reject(new Error("IndexedDBの更新がブロックされています。Chromeで開いている同じアプリのタブやPWAをすべて閉じてから、このページを再読み込みしてください。"));
        };
        req.onupgradeneeded=()=>{
          const db=req.result;
          if(!db.objectStoreNames.contains(STORES.cards)){
            const store=db.createObjectStore(STORES.cards,{keyPath:"id"});
            store.createIndex("frontText","frontText",{unique:false});
            store.createIndex("updatedAt","updatedAt",{unique:false});
          }
          if(!db.objectStoreNames.contains(STORES.states)){
            const store=db.createObjectStore(STORES.states,{keyPath:"cardId"});
            store.createIndex("dueAt","dueAt",{unique:false});
          }
          if(!db.objectStoreNames.contains(STORES.logs)){
            const store=db.createObjectStore(STORES.logs,{keyPath:"id"});
            store.createIndex("cardId","cardId",{unique:false});
            store.createIndex("reviewedAt","reviewedAt",{unique:false});
          }
          if(!db.objectStoreNames.contains(STORES.images)){
            const store=db.createObjectStore(STORES.images,{keyPath:"id"});
            store.createIndex("cardId","cardId",{unique:false});
          }
          if(!db.objectStoreNames.contains(STORES.settings))db.createObjectStore(STORES.settings,{keyPath:"key"});
          if(!db.objectStoreNames.contains(STORES.completions))db.createObjectStore(STORES.completions,{keyPath:"dateKey"});
          if(!db.objectStoreNames.contains(STORES.tombstones)){
            const store=db.createObjectStore(STORES.tombstones,{keyPath:"id"});
            store.createIndex("collection","collection",{unique:false});
            store.createIndex("updatedAt","updatedAt",{unique:false});
          }
        };
        req.onsuccess=()=>{
          clearTimeout(blockedTimer);
          const db=req.result;
          db.onversionchange=()=>db.close();
          resolve(db);
        };
        req.onerror=()=>{
          clearTimeout(blockedTimer);
          reject(req.error);
        };
        blockedTimer=setTimeout(()=>{
          dbPromise=null;
          reject(new Error("IndexedDBの初期化が完了しません。Chromeで同じアプリの別タブやPWAが開いていれば閉じてから再読み込みしてください。"));
        },8000);
      });
      return dbPromise;
    }

    async function getAll(storeName){
      const db=await openDb();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(storeName,"readonly");
        const req=tx.objectStore(storeName).getAll();
        req.onsuccess=()=>resolve(req.result||[]);
        req.onerror=()=>reject(req.error);
      });
    }

    async function putItem(storeName,value){
      const db=await openDb();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(storeName,"readwrite");
        tx.objectStore(storeName).put(value);
        tx.oncomplete=()=>resolve();
        tx.onerror=()=>reject(tx.error);
      });
    }

    async function deleteItem(storeName,key){
      const db=await openDb();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(storeName,"readwrite");
        tx.objectStore(storeName).delete(key);
        tx.oncomplete=()=>resolve();
        tx.onerror=()=>reject(tx.error);
      });
    }

    async function clearStore(storeName){
      const db=await openDb();
      return new Promise((resolve,reject)=>{
        const tx=db.transaction(storeName,"readwrite");
        tx.objectStore(storeName).clear();
        tx.oncomplete=()=>resolve();
        tx.onerror=()=>reject(tx.error);
      });
    }

    async function loadData(){
      const [cards,states,logs,images,settingsRows,dailyCompletions,tombstones]=await Promise.all([
        getAll(STORES.cards),
        getAll(STORES.states),
        getAll(STORES.logs),
        getAll(STORES.images),
        getAll(STORES.settings),
        getAll(STORES.completions),
        getAll(STORES.tombstones)
      ]);
      appState.cards=cards.sort((a,b)=>(a.createdAt||"").localeCompare(b.createdAt||""));
      appState.reviewStates=states;
      appState.logs=logs;
      appState.images=images;
      appState.dailyCompletions=(dailyCompletions||[]).sort((a,b)=>String(a.dateKey||"").localeCompare(String(b.dateKey||"")));
      appState.tombstones=tombstones||[];
      const saved=settingsRows.find(row=>row.key==="settings");
      if(saved)appState.settings={...appState.settings,...saved.value};
      appState.settings.googleDriveAutoSyncEnabled=true;
      appState.settings.googleDriveAutoSyncIntervalMinutes=Math.max(1,Number(appState.settings.googleDriveAutoSyncIntervalMinutes||5));
      appState.streakDays=calculateCurrentStreak(appState.dailyCompletions);
      selectNextCard();
    }

    const nowIso=()=>new Date().toISOString();
    const addMinutes=(date,minutes)=>new Date(date.getTime()+minutes*60000);
    const addDays=(date,days)=>new Date(date.getTime()+days*86400000);

    function startOfToday(){
      const date=new Date();
      date.setHours(0,0,0,0);
      return date;
    }

    function localDateKey(value=new Date()){
      const date=value instanceof Date?value:new Date(value);
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
    }

    function parseDateKey(dateKey){
      const [year,month,day]=String(dateKey||"").split("-").map(Number);
      if(!year||!month||!day)return null;
      return new Date(Date.UTC(year,month-1,day));
    }

    function daysBetweenDateKeys(laterKey,earlierKey){
      const later=parseDateKey(laterKey),earlier=parseDateKey(earlierKey);
      if(!later||!earlier)return Number.NaN;
      return Math.round((later.getTime()-earlier.getTime())/86400000);
    }

    function calculateCurrentStreak(completions,todayKey=localDateKey()){
      const uniqueDateKeys=[...new Set((completions||[]).map(row=>row.dateKey).filter(Boolean))].sort();
      if(!uniqueDateKeys.length)return 0;
      const latestKey=uniqueDateKeys[uniqueDateKeys.length-1];
      const gapFromToday=daysBetweenDateKeys(todayKey,latestKey);
      if(!Number.isFinite(gapFromToday)||gapFromToday<0||gapFromToday>1)return 0;
      let streak=1;
      for(let index=uniqueDateKeys.length-1;index>0;index--){
        if(daysBetweenDateKeys(uniqueDateKeys[index],uniqueDateKeys[index-1])!==1)break;
        streak++;
      }
      return streak;
    }

    function escapeHtml(value){
      return String(value??"")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function normalizeText(value){
      return String(value??"").trim().replace(/\s+/g," ");
    }

    function makeId(){
      const raw=crypto.randomUUID?crypto.randomUUID():`${Date.now()}_${Math.random().toString(16).slice(2)}`;
      return String(raw).replace(/[^a-zA-Z0-9_]/g,"_");
    }

    async function sha256(input){
      const data=new TextEncoder().encode(input);
      const hash=await crypto.subtle.digest("SHA-256",data);
      return Array.from(new Uint8Array(hash)).map(byte=>byte.toString(16).padStart(2,"0")).join("");
    }

    async function createCardId(front,back){
      return "card_"+(await sha256(`${normalizeText(front).toLowerCase()}::${normalizeText(back)}`)).slice(0,32);
    }

    async function createSourceHash(row){
      return (await sha256(JSON.stringify(row))).slice(0,32);
    }

    function timestampMs(value){
      const ms=new Date(value||0).getTime();
      return Number.isFinite(ms)?ms:0;
    }

    function recordUpdatedAt(record){
      return record?.updatedAt||record?.lastReviewedAt||record?.reviewedAt||record?.lastCompletedAt||record?.createdAt||record?.firstCompletedAt||record?.dueAt||"1970-01-01T00:00:00.000Z";
    }

    function tombstoneId(collection,key){
      return `${collection}:${String(key)}`;
    }

    async function putSyncTombstone(collection,key,updatedAt=nowIso()){
      if(!collection||!key)return;
      await putItem(STORES.tombstones,{id:tombstoneId(collection,key),collection,key:String(key),updatedAt});
    }

    async function putSyncTombstonesForRows(collection,rows,keyName){
      const timestamp=nowIso();
      for(const row of rows||[]){
        const key=row?.[keyName];
        if(key)await putSyncTombstone(collection,key,timestamp);
      }
    }

    function latestTombstoneMap(...groups){
      const map=new Map();
      for(const rows of groups){
        for(const row of rows||[]){
          if(!row?.collection||!row?.key)continue;
          const id=tombstoneId(row.collection,row.key);
          const current=map.get(id);
          if(!current||timestampMs(row.updatedAt)>timestampMs(current.updatedAt))map.set(id,{...row,id});
        }
      }
      return map;
    }

    function blobToDataUrl(blob){
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onload=()=>resolve(String(reader.result||""));
        reader.onerror=()=>reject(reader.error);
        reader.readAsDataURL(blob);
      });
    }

    async function dataUrlToBlob(dataUrl){
      const res=await fetch(dataUrl);
      if(!res.ok)throw new Error("画像データの復元に失敗しました。");
      return res.blob();
    }

    async function serializeRecordForSync(config,row){
      if(config.collection!=="images")return{...row,updatedAt:recordUpdatedAt(row)};
      const {blob,...rest}=row;
      return{...rest,updatedAt:recordUpdatedAt(row),blobDataUrl:blob?await blobToDataUrl(blob):""};
    }

    async function hydrateRecordFromSync(config,row){
      if(config.collection!=="images")return{...row,updatedAt:recordUpdatedAt(row)};
      const {blobDataUrl,blob,...rest}=row;
      const imageBlob=blob||((blobDataUrl&&String(blobDataUrl).startsWith("data:"))?await dataUrlToBlob(blobDataUrl):new Blob([],{type:rest.type||"application/octet-stream"}));
      return{...rest,blob:imageBlob,updatedAt:recordUpdatedAt(row)};
    }

    function normalizeDriveSnapshot(payload){
      if(!payload||typeof payload!=="object")throw new Error("Google Driveの同期ファイル形式が不正です。");
      const data=payload.data&&typeof payload.data==="object"?payload.data:payload;
      return{
        cards:Array.isArray(data.cards)?data.cards:[],
        reviewStates:Array.isArray(data.reviewStates)?data.reviewStates:[],
        reviewLogs:Array.isArray(data.reviewLogs)?data.reviewLogs:[],
        dailyCompletions:Array.isArray(data.dailyCompletions)?data.dailyCompletions:[],
        images:Array.isArray(data.images)?data.images:[],
        tombstones:Array.isArray(data.tombstones)?data.tombstones:[],
        settings:data.settings&&typeof data.settings==="object"?data.settings:{}
      };
    }

    async function buildDriveSyncSnapshot(){
      await loadData();
      const data={};
      for(const config of SYNC_COLLECTIONS){
        const rows=await getAll(config.store);
        data[config.collection]=[];
        for(const row of rows)data[config.collection].push(await serializeRecordForSync(config,row));
      }
      data.tombstones=await getAll(STORES.tombstones);
      data.settings={nickname:appState.settings.nickname||"",nicknameUpdatedAt:appState.settings.nicknameUpdatedAt||null};
      return{schemaVersion:1,app:"flashcards-pwa",exportedAt:nowIso(),data};
    }

    async function mergeDriveSnapshot(payload){
      const data=normalizeDriveSnapshot(payload);
      const tombstoneMap=latestTombstoneMap(await getAll(STORES.tombstones),data.tombstones);
      for(const tombstone of tombstoneMap.values())await putItem(STORES.tombstones,tombstone);
      let upserted=0,deleted=0;

      for(const config of SYNC_COLLECTIONS){
        const remoteRows=Array.isArray(data[config.collection])?data[config.collection]:[];
        const localRows=await getAll(config.store);
        const localByKey=new Map(localRows.map(row=>[String(row[config.key]),row]));

        for(const remoteRow of remoteRows){
          const key=remoteRow?.[config.key];
          if(!key)continue;
          const tombstone=tombstoneMap.get(tombstoneId(config.collection,key));
          if(tombstone&&timestampMs(tombstone.updatedAt)>=timestampMs(recordUpdatedAt(remoteRow))){
            if(localByKey.has(String(key))){
              await deleteItem(config.store,key);
              deleted++;
            }
            continue;
          }
          const localRow=localByKey.get(String(key));
          if(!localRow||timestampMs(recordUpdatedAt(remoteRow))>timestampMs(recordUpdatedAt(localRow))){
            await putItem(config.store,await hydrateRecordFromSync(config,remoteRow));
            upserted++;
          }
        }

        for(const localRow of localRows){
          const key=localRow?.[config.key];
          if(!key)continue;
          const tombstone=tombstoneMap.get(tombstoneId(config.collection,key));
          if(tombstone&&timestampMs(tombstone.updatedAt)>timestampMs(recordUpdatedAt(localRow))){
            await deleteItem(config.store,key);
            deleted++;
          }
        }
      }

      const remoteNicknameTime=timestampMs(data.settings.nicknameUpdatedAt);
      const localNicknameTime=timestampMs(appState.settings.nicknameUpdatedAt);
      if(remoteNicknameTime>localNicknameTime){
        appState.settings={...appState.settings,nickname:data.settings.nickname||"",nicknameUpdatedAt:data.settings.nicknameUpdatedAt};
        await putItem(STORES.settings,{key:"settings",value:appState.settings});

    async function ensureGoogleDriveToken({interactive=true}={}){
      if(googleDriveTokenValid())return googleDriveAccessToken;
      const clientId=normalizeText(appState.settings.googleDriveClientId||"");
      if(!clientId)throw new Error("Google OAuth クライアントIDを設定してください。");
      if(!interactive)throw new Error("Google Driveの再連携が必要です。");
      if(!window.google?.accounts?.oauth2)throw new Error("Google Identity Servicesを読み込めませんでした。ネットワーク接続を確認してください。");

      return new Promise((resolve,reject)=>{
        let settled=false;
        const timer=setTimeout(()=>{
          if(settled)return;
          settled=true;
          reject(new Error("Google連携がタイムアウトしました。"));
        },60000);
        const client=google.accounts.oauth2.initTokenClient({
          client_id:clientId,
          scope:DRIVE_SYNC_SCOPE,
          callback:response=>{
            if(settled)return;
            settled=true;
            clearTimeout(timer);
            if(response?.error){
              reject(new Error(response.error_description||response.error));
              return;
            }
            googleDriveAccessToken=response.access_token||"";
            googleDriveTokenExpiresAt=Date.now()+Math.max(1,Number(response.expires_in||3600))*1000;
            resolve(googleDriveAccessToken);
          },
          error_callback:error=>{
            if(settled)return;
            settled=true;
            clearTimeout(timer);
            reject(new Error(error?.message||error?.type||"Google連携に失敗しました。"));
          }
        });
        client.requestAccessToken({prompt:appState.settings.googleDriveLastSyncAt?"":"consent"});
      });
    }

    async function googleDriveRequest(url,{method="GET",headers={},body,interactive=true,retry=true}={}){
      const token=await ensureGoogleDriveToken({interactive});
      const res=await fetch(url,{method,headers:{Authorization:`Bearer ${token}`,...headers},body});
      if(res.status===401&&retry){
        googleDriveAccessToken="";
        googleDriveTokenExpiresAt=0;
        return googleDriveRequest(url,{method,headers,body,interactive,retry:false});
      }
      if(!res.ok){
        const text=await res.text().catch(()=>"");
        throw new Error(`Google Drive API エラー HTTP ${res.status}: ${text.slice(0,240)}`);
      }
      return res;
    }

    async function findDriveSyncFile({interactive=true}={}){

      });
      const res=await googleDriveRequest(`https://www.googleapis.com/drive/v3/files?${params}`,{interactive});
      const data=await res.json();
      return (data.files||[]).sort((a,b)=>String(b.modifiedTime||"").localeCompare(String(a.modifiedTime||"")))[0]||null;
    }

    async function syncGoogleDrive(mode="merge",isAuto=false){
      if(googleDriveSyncInFlight)return;
      if(mode!=="merge")mode="merge";
      googleDriveSyncInFlight=true;
      if(!isAuto)clearMessages();
      try{
        const hadLocalData=appState.cards.length>0||appState.reviewStates.length>0||appState.logs.length>0||appState.images.length>0||appState.dailyCompletions.length>0;

        }
      }catch(error){
        console.error(error);

        }else{
          appState.error=`Google Drive同期に失敗しました。\n${error.message||error}`;

        await loadData();

    function parseCsv(text){
      const rows=[];
      let row=[],field="",quoted=false;
      const source=String(text||"").replace(/^\uFEFF/,"");
      for(let index=0;index<source.length;index++){
        const char=source[index],next=source[index+1];
        if(char==='"'){
          if(quoted&&next==='"'){
            field+='"';
            index++;
          }else{
            quoted=!quoted;
          }
          continue;
        }
        if(char===","&&!quoted){
          row.push(field);
          field="";
          continue;
        }
        if((char==="\n"||char==="\r")&&!quoted){
          if(char==="\r"&&next==="\n")index++;
          row.push(field);
          rows.push(row);
          row=[];
          field="";
          continue;
        }
        field+=char;
      }
      row.push(field);
      rows.push(row);
      return rows.filter(currentRow=>currentRow.some(cell=>String(cell).trim()!==""));
    }

    function rowsToObjects(rows){
      if(!rows.length)return[];
      const headers=rows[0].map(header=>String(header||"").trim());
      return rows.slice(1).map((row,index)=>{
        const object={__line:index+2};
        headers.forEach((header,headerIndex)=>{object[header]=row[headerIndex]??""});
        return object;
      });
    }

    function resolveImportedFields(row){
      const rawId=row.id??row.ID??row["カードID"]??row.cardId??row["Card ID"]??"";
      const japanese=row["日本語"]??row["意味"]??row["和訳"]??row["裏面"]??row.Japanese??"";
      const english=row["英語"]??row["単語"]??row["表面"]??row.English??"";
      const example=row["例文"]??row["例"]??row.sentence??row.Example??"";
      return{
        externalId:normalizeText(rawId),
        frontText:normalizeText(english),
        backText:normalizeText(japanese),
        exampleText:String(example??"").trim()
      };
    }

    async function createImportedCardId(fields){
      if(fields.externalId)return "sheet_"+(await sha256(fields.externalId)).slice(0,32);
      return createCardId(fields.frontText,fields.backText);
    }

    async function importRows(objects,sourceLabel="インポート"){
      let created=0,updated=0,skipped=0;
      const errors=[];
      const existingById=new Map(appState.cards.map(card=>[card.id,card]));
      const seen=new Set();
      for(const [index,row] of objects.entries()){
        const fields=resolveImportedFields(row);
        const line=row.__line||index+2;
        if(!fields.frontText){
          errors.push(`${line}行目: 英語が空です。`);
          continue;
        }
        if(!fields.backText){
          errors.push(`${line}行目: 日本語が空です。`);
          continue;
        }
        const id=await createImportedCardId(fields);
        if(seen.has(id)){
          skipped++;
          continue;
        }
        seen.add(id);
        const sourceHash=await createSourceHash(fields);
        const existing=existingById.get(id);
        const timestamp=nowIso();
        if(existing){
          if(existing.sourceHash===sourceHash){
            skipped++;
            continue;
          }
          const updatedCard={...existing,externalId:fields.externalId||existing.externalId||"",frontText:fields.frontText,backText:fields.backText,exampleText:fields.exampleText,sourceHash,sourceLabel,updatedAt:timestamp};
          await putItem(STORES.cards,updatedCard);
          existingById.set(id,updatedCard);
          updated++;
          continue;
        }
        const card={id,externalId:fields.externalId,frontText:fields.frontText,backText:fields.backText,exampleText:fields.exampleText,noteText:"",imageIds:[],suspended:false,sourceHash,sourceLabel,createdAt:timestamp,updatedAt:timestamp};
        const state={cardId:id,dueAt:timestamp,intervalDays:0,easeFactor:2.5,reviewCount:0,lapseCount:0,lastReviewedAt:null,updatedAt:timestamp};
        await putItem(STORES.cards,card);
        await putItem(STORES.states,state);
        existingById.set(id,card);
        created++;
      }
      await loadData();
      appState.importResult={created,updated,skipped,errors};
      queueGoogleDriveAutoSync();
      return{created,updated,skipped,errors};
    }

    function parseGasJsonText(text){
      const raw=String(text||"").trim();
      if(!raw)throw new Error("貼り付けられたJSONが空です。");
      try{return JSON.parse(raw)}catch{}
      const match=raw.match(/^[a-zA-Z_$][\w$]*\((.*)\);?$/s);
      if(match){
        try{return JSON.parse(match[1])}catch{}
      }
      throw new Error('JSONとして読み取れませんでした。{"cards":[...]} 全体を貼り付けてください。');
    }

    function normalizeGasRows(payload){
      if(typeof payload==="string")payload=parseGasJsonText(payload);
      if(payload&&payload.error)throw new Error(`GASエラー: ${payload.error}`);
      const rows=Array.isArray(payload)?payload:payload?.cards||payload?.rows||payload?.data||[];
      if(!Array.isArray(rows))throw new Error("GASのレスポンス形式が不正です。配列、または { cards: [...] } を返してください。");
      return rows.map((row,index)=>({...row,__line:row.__line||index+2}));
    }

    function normalizeGasUrl(url){
      const raw=String(url||"").trim();
      if(!raw)throw new Error("GAS WebアプリURLが空です。");
      let parsed;
      try{
        parsed=new URL(raw);
      }catch{
        throw new Error("GAS WebアプリURLの形式が不正です。https://script.google.com/macros/s/.../exec の形にしてください。");
      }
      if(parsed.protocol!=="https:")throw new Error("GAS WebアプリURLは https:// で始まる必要があります。");
      if(!/script\.google\.com$/.test(parsed.hostname)&&!/googleusercontent\.com$/.test(parsed.hostname))throw new Error("GAS WebアプリURLではない可能性があります。script.google.com の /exec URLを貼ってください。");
      if(!parsed.pathname.includes("/exec"))throw new Error("/dev URLではなく、デプロイ後に表示される /exec URLを貼ってください。");
      return parsed.toString();
    }

    async function fetchGasRowsViaFetch(url,timeoutMs=15000){
      const controller=new AbortController();
      const timer=setTimeout(()=>controller.abort(),timeoutMs);
      try{
        const target=new URL(url);
        target.searchParams.set("mode","json");
        target.searchParams.set("t",Date.now().toString());
        const res=await fetch(target.toString(),{method:"GET",cache:"no-store",signal:controller.signal,redirect:"follow"});
        const text=await res.text();
        if(!res.ok)throw new Error(`HTTP ${res.status}: ${text.slice(0,200)}`);
        return normalizeGasRows(parseGasJsonText(text));
      }finally{
        clearTimeout(timer);
      }
    }

    async function fetchGasRowsViaJsonp(url,timeoutMs=15000){
      return new Promise((resolve,reject)=>{
        let done=false;
        const callbackName="flashcardsGasCallback_"+makeId();
        const script=document.createElement("script");
        const timer=setTimeout(()=>{
          if(done)return;
          done=true;
          cleanup();
          reject(new Error("JSONPがタイムアウトしました。JSON貼り付け同期を使ってください。"));
        },timeoutMs);

        function cleanup(){
          clearTimeout(timer);
          try{delete window[callbackName]}catch{window[callbackName]=undefined}
          script.remove();
        }

        window[callbackName]=data=>{
          if(done)return;
          done=true;
          cleanup();
          try{
            resolve(normalizeGasRows(data));
          }catch(error){
            reject(error);
          }
        };

        let target;
        try{
          target=new URL(url);
        }catch(error){
          cleanup();
          reject(error);
          return;
        }
        target.searchParams.set("callback",callbackName);
        target.searchParams.set("t",Date.now().toString());
        script.src=target.toString();
        script.async=true;
        script.onerror=()=>{
          if(done)return;
          done=true;
          cleanup();
          reject(new Error("JSONP script読み込みに失敗しました。JSON貼り付け同期を使ってください。"));
        };
        document.body.appendChild(script);
      });
    }

    async function fetchGasRows(url){
      const normalized=normalizeGasUrl(url);
      const attempts=[];
      try{return await fetchGasRowsViaFetch(normalized)}catch(error){attempts.push(`fetch失敗: ${error.message||error}`)}
      try{return await fetchGasRowsViaJsonp(normalized)}catch(error){attempts.push(`JSONP失敗: ${error.message||error}`)}
      throw new Error(["GASへの直接接続に失敗しました。",attempts.join("\n"),"確実な反映方法: 『GAS URLを開く』→ JSONコピー → 『JSON貼り付け同期』。"].join("\n\n"));
    }

    function buildGasUrlWithJsonMode(url){
      const target=new URL(normalizeGasUrl(url));
      target.searchParams.set("mode","json");
      target.searchParams.set("t",Date.now().toString());
      return target.toString();
    }

    function getReviewState(cardId){
      return appState.reviewStates.find(state=>state.cardId===cardId)||{cardId,dueAt:nowIso(),intervalDays:0,easeFactor:2.5,reviewCount:0,lapseCount:0,lastReviewedAt:null};
    }

    function isDue(state){
      return new Date(state.dueAt).getTime()<=Date.now();
    }

    function dueCards(){
      return appState.cards
        .filter(card=>!card.suspended)
        .map(card=>({card,state:getReviewState(card.id)}))
        .filter(({state})=>isDue(state))
        .sort((left,right)=>{
          const leftNew=left.state.reviewCount===0?1:0,rightNew=right.state.reviewCount===0?1:0;
          if(leftNew!==rightNew)return leftNew-rightNew;
          return new Date(left.state.dueAt)-new Date(right.state.dueAt);
        })
        .map(({card})=>card);
    }

    function selectNextCard(){
      const due=dueCards();
      if(!due.some(card=>card.id===appState.currentCardId))appState.currentCardId=due[0]?.id||null;
      appState.answerVisible=false;
    }

    function currentCard(){

    function calculateNextReview(state,rating){
      const now=new Date();
      let intervalDays=Number(state.intervalDays||0);
      let easeFactor=Number(state.easeFactor||2.5);
      let lapseCount=Number(state.lapseCount||0);
      let dueAt;
      if(rating==="again"){
        intervalDays=0;
        easeFactor=Math.max(1.3,easeFactor-.2);
        lapseCount++;
        dueAt=addMinutes(now,10);
      }
      if(rating==="hard"){
        intervalDays=intervalDays===0?1:Math.max(1,Math.round(intervalDays*1.2));
        easeFactor=Math.max(1.3,easeFactor-.15);
        dueAt=addDays(now,intervalDays);
      }
      if(rating==="good"){
        intervalDays=intervalDays===0?2:Math.max(2,Math.round(intervalDays*easeFactor));
        dueAt=addDays(now,intervalDays);
      }
      if(rating==="easy"){
        intervalDays=intervalDays===0?4:Math.max(4,Math.round(intervalDays*easeFactor*1.4));
        easeFactor=Math.min(3.4,easeFactor+.15);
        dueAt=addDays(now,intervalDays);
      }
      const reviewedAt=now.toISOString();
      return{cardId:state.cardId,dueAt:dueAt.toISOString(),intervalDays,easeFactor,reviewCount:Number(state.reviewCount||0)+1,lapseCount,lastReviewedAt:reviewedAt,updatedAt:reviewedAt};
    }

    async function rateCurrentCard(rating){
      const card=currentCard();
      if(!card)return;
      stopSpeaking();
      const oldState=getReviewState(card.id);
      const newState=calculateNextReview(oldState,rating);
      const reviewedAt=nowIso();
      const log={id:makeId(),cardId:card.id,reviewedAt,rating,previousIntervalDays:oldState.intervalDays||0,nextIntervalDays:newState.intervalDays||0,updatedAt:reviewedAt};
      appState.sessionReviewedCount+=1;
      await putItem(STORES.states,newState);
      await putItem(STORES.logs,log);
      await loadData();
      const dueCount=dueCards().length;
      const ratingsToday=todayRatings();
      const reviewedTodayCount=ratingsToday.length;
      const reachedTenQuestionMilestone=reviewedTodayCount>0&&reviewedTodayCount%10===0;
      if(appState.sessionReviewedCount>0&&dueCount===0){
        const completion=await recordDailyCompletion();
        await loadData();
        if(reachedTenQuestionMilestone){
          appState.completionModalState=createTenQuestionModalState(ratingsToday.slice(-10),{alsoCompleted:true,completionCount:Number(completion?.completionCount||1)});
        }else{
          appState.completionModalState=createCompletionModalState(completion);
        }
        appState.message=null;
      }else if(reachedTenQuestionMilestone){
        appState.completionModalState=createTenQuestionModalState(ratingsToday.slice(-10));
        appState.message=null;
      }else{
        appState.message=`${ratingLabels[rating]}: 次回は${rating==="again"?"10分後":`${newState.intervalDays}日後`}`;
      }
      queueGoogleDriveAutoSync();
      render();
    }

      const englishVoices=(voices||[]).filter(voice=>/^en(-|_)/i.test(voice?.lang||""));
      return englishVoices.find(voice=>/^en-us/i.test(voice.lang||""))||englishVoices.find(voice=>/^en-gb/i.test(voice.lang||""))||englishVoices[0]||null;

    function speakEnglishText(text){
      const phrase=normalizeText(text);
      if(!phrase){
        showSpeechWarning("読み上げる英語がありません。");
        return;
      }
      if(typeof window==="undefined"||!("speechSynthesis" in window)||typeof window.SpeechSynthesisUtterance!=="function"){
        showSpeechWarning("このブラウザでは読み上げに対応していません。");
        return;
      }
      try{
        const utterance=new SpeechSynthesisUtterance(phrase);
        utterance.lang="en-US";
        utterance.rate=.92;
        utterance.pitch=1;
        const voice=pickEnglishVoice(window.speechSynthesis.getVoices());
        if(voice)utterance.voice=voice;
        utterance.onerror=()=>showSpeechWarning("英語の読み上げに失敗しました。");
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      }catch(error){
        showSpeechWarning(`英語の読み上げに失敗しました。\n${error.message||error}`);
      }
    }

    function runSelfTests(){
      const tests=[];
      const assert=(name,condition,detail="")=>tests.push({name,ok:!!condition,detail});
      try{
        const rows=parseCsv('id,日本語,英語,例文\n001,"切羽,詰まった",hard-pressed,"a, b"');
        assert("CSV parser handles quoted commas",rows[1][1]==="切羽,詰まった"&&rows[1][3]==="a, b",JSON.stringify(rows));
        const objects=rowsToObjects(rows);
        assert("rowsToObjects maps Japanese headers",objects[0]["日本語"]==="切羽,詰まった",JSON.stringify(objects[0]));
        const fields=resolveImportedFields({id:"001",日本語:"意味",英語:"word",例文:"sentence"});
        assert("resolveImportedFields maps expected columns",fields.externalId==="001"&&fields.frontText==="word"&&fields.backText==="意味",JSON.stringify(fields));
        const gasRows=normalizeGasRows({cards:[{id:"001",日本語:"意味",英語:"word"}]});
        assert("normalizeGasRows accepts { cards: [...] }",gasRows.length===1&&gasRows[0].__line===2,JSON.stringify(gasRows));
        const pastedRows=normalizeGasRows('{"cards":[{"id":"002","日本語":"勉強になる","英語":"enlightening"}]}');
        assert("normalizeGasRows accepts pasted JSON text",pastedRows.length===1&&pastedRows[0].id==="002",JSON.stringify(pastedRows));
        const jsonpRows=normalizeGasRows('callbackName({"cards":[{"id":"003","日本語":"凝縮する","英語":"condense"}]});');
        assert("normalizeGasRows accepts pasted JSONP text",jsonpRows.length===1&&jsonpRows[0].id==="003",JSON.stringify(jsonpRows));
        assert("GAS URL validator accepts /exec",normalizeGasUrl("https://script.google.com/macros/s/abc/exec").includes("/exec"));
        let rejected=false;
        try{normalizeGasUrl("https://script.google.com/macros/s/abc/dev")}catch{rejected=true}
        assert("GAS URL validator rejects /dev",rejected);
        assert("buildGasUrlWithJsonMode appends mode=json",buildGasUrlWithJsonMode("https://script.google.com/macros/s/abc/exec").includes("mode=json"));
        const preferredVoice=pickEnglishVoice([{lang:"ja-JP",name:"Japanese Voice"},{lang:"en-GB",name:"English UK"},{lang:"en-US",name:"English US"}]);
        assert("pickEnglishVoice prefers en-US",preferredVoice?.name==="English US",JSON.stringify(preferredVoice));
        assert("buildPraiseHeadline includes nickname",buildPraiseHeadline("ワンダフル！","Yuki")==="Yuki、ワンダフル！");
        assert("calculateCorrectRate treats non-again as correct",calculateCorrectRate(["good","hard","again","easy"])===0.75);
        const milestoneState=createTenQuestionModalState(["good","good","hard","easy","good","good","easy","good","hard","good"]);
        assert("createTenQuestionModalState rewards high accuracy",milestoneState.headline.includes("最高！"),JSON.stringify(milestoneState));
        assert("calculateCurrentStreak counts unique completed days",calculateCurrentStreak([{dateKey:"2026-04-24"},{dateKey:"2026-04-25"},{dateKey:"2026-04-25"},{dateKey:"2026-04-26"}],"2026-04-26")===3);
        assert("calculateCurrentStreak resets after a missed day",calculateCurrentStreak([{dateKey:"2026-04-24"}],"2026-04-26")===0);
        assert("tombstoneId includes collection and key",tombstoneId("cards","abc")==="cards:abc");
        assert("recordUpdatedAt falls back to reviewedAt",recordUpdatedAt({reviewedAt:"2026-04-26T00:00:00.000Z"})==="2026-04-26T00:00:00.000Z");
        const tombstones=latestTombstoneMap([{collection:"cards",key:"1",updatedAt:"2026-04-24T00:00:00.000Z"}],[{collection:"cards",key:"1",updatedAt:"2026-04-25T00:00:00.000Z"}]);
        assert("latestTombstoneMap keeps newest tombstone",tombstones.get("cards:1").updatedAt==="2026-04-25T00:00:00.000Z");
        const driveSnapshot=normalizeDriveSnapshot({data:{cards:[{id:"1"}],reviewStates:[],reviewLogs:[],dailyCompletions:[],images:[],tombstones:[],settings:{nickname:"Yuki"}}});
        assert("normalizeDriveSnapshot reads Drive sync payload",driveSnapshot.cards.length===1&&driveSnapshot.settings.nickname==="Yuki");
      }catch(error){
        tests.push({name:"Self-test crashed",ok:false,detail:String(error.message||error)});
      }
      const pass=tests.filter(test=>test.ok).length;
      appState.diagnostic=tests.map(test=>`${test.ok?"OK":"NG"}: ${test.name}${test.detail?`\n  ${test.detail}`:""}`).join("\n")+`\n\n${pass}/${tests.length} passed`;
      appState.message=pass===tests.length?"内蔵テストはすべて成功しました。":"内蔵テストに失敗があります。";
      if(pass!==tests.length)appState.error="内蔵テストの失敗を確認してください。";
      render();
    }

    }

    function renderImport(){
      return`${renderDriveSync()}<div class="card"><h2 style="margin:0 0 10px;letter-spacing:-.03em">Google Spreadsheet 同期</h2><div class="notice">GitHub PagesなどのHTTPS公開環境では直接同期を試せます。失敗した場合はJSON貼り付け同期で反映できます。<br>対応列: <strong>id</strong>任意, <strong>日本語</strong>, <strong>英語</strong>, <strong>例文</strong></div><label for="gasUrl">GAS WebアプリURL</label><input id="gasUrl" type="text" placeholder="https://script.google.com/macros/s/.../exec" value="${escapeHtml(appState.settings.gasUrl||"")}"/><div class="toggleLine"><div><strong>アプリ起動時に直接同期を試す</strong><div class="small">直接同期がブロックされる環境では警告だけ表示します。</div></div><input id="autoSyncEnabled" class="checkbox" type="checkbox" ${appState.settings.autoSyncEnabled?"checked":""}/></div><label for="autoSyncIntervalHours">自動同期を試す間隔（時間）</label><input id="autoSyncIntervalHours" type="number" inputmode="numeric" value="${escapeHtml(appState.settings.autoSyncIntervalHours||12)}"/><p class="small">最終同期: ${appState.settings.lastSyncAt?formatDateTime(appState.settings.lastSyncAt):"未同期"}</p><div class="row"><button onclick="saveSyncSettings()">同期設定を保存</button><button class="blue" onclick="saveSyncSettings().then(()=>syncFromGas(false))">直接同期を試す</button><button class="ghost" onclick="testGasConnection()">接続テスト</button><button class="secondary" onclick="openGasUrlForCheck()">GAS URLを開く</button><button class="secondary" onclick="copyGasUrl()">URLをコピー</button></div></div><div class="card"><h2 style="margin:0 0 10px;letter-spacing:-.03em">JSON貼り付け同期</h2><div class="notice">直接同期が失敗する場合の確実な反映方法です。GAS URLを開いて表示されたJSON全体をここに貼ってください。</div><label for="gasJsonPaste">GASで表示されたJSON</label><textarea id="gasJsonPaste" placeholder='{"cards":[{"id":"001","日本語":"切羽詰まった","英語":"hard-pressed","例文":"..."}]}'></textarea><button class="blue" onclick="syncFromPastedGasJson()">貼り付けJSONを同期</button></div><div class="card"><h2 style="margin:0 0 10px;letter-spacing:-.03em">CSVインポート</h2><div class="notice">CSVファイルからの手動追加も使えます。対応列: <strong>id</strong>任意, <strong>日本語</strong>, <strong>英語</strong>, <strong>例文</strong></div><label for="csvFile">CSVファイル</label><input id="csvFile" class="fileInput" type="file" accept=".csv,text/csv" onchange="importCsvFile(this.files[0])"/></div><div class="card"><h3 style="margin-top:0">テスト</h3><button class="ghost" onclick="runSelfTests()">内蔵テストを実行</button></div><div class="card"><h3 style="margin-top:0">Spreadsheet / CSV例</h3><pre class="notice mono" style="overflow:auto;white-space:pre-wrap;">id,日本語,英語,例文\n001,切羽詰まった,hard-pressed,you will be hard-pressed to find anything cheaper in this location.\n002,勉強になる,enlightening,I'm glad that you found it enlightening</pre></div>`;
    }

    function renderSettings(){
      const nickname=getNickname();
      const preview=buildPraiseHeadline("ワンダフル！",nickname);
      return`<div class="card"><h2 style="margin:0 0 10px;letter-spacing:-.03em">設定</h2><div class="notice">呼び名は、学習カードを全部終えたときの称賛モーダルで使います。</div><label for="nicknameInput">呼び名</label><input id="nicknameInput" type="text" maxlength="24" placeholder="例: Yuki" value="${escapeHtml(appState.settings.nickname||"")}"/><p class="settingsPreview">プレビュー: ${escapeHtml(preview)}</p><div class="row"><button onclick="saveNicknameSettings()">呼び名を保存</button></div></div>`;
    }

    function filteredCards(){
      const query=normalizeText(appState.search).toLowerCase();
      let cards=[...appState.cards];
      if(query)cards=cards.filter(card=>[card.frontText,card.backText,card.exampleText,card.noteText].some(value=>String(value||"").toLowerCase().includes(query)));
      return cards.sort((left,right)=>left.frontText.localeCompare(right.frontText));
    }

    function renderCards(){
      const cards=filteredCards();
      if(!appState.cards.length)return`<div class="card empty">カードがありません。インポートから読み込んでください。</div>`;
      return`<div class="card"><div class="searchBar"><input type="search" placeholder="カードを検索" value="${escapeHtml(appState.search)}" oninput="appState.search=this.value;render();"/></div>${cards.length?cards.map(renderCardListItem).join(""):`<div class="empty">該当するカードがありません。</div>`}</div>`;
    }

    function renderCardListItem(card){
      const state=getReviewState(card.id);
      return`<div class="listItem"><div><div class="listTitle">${escapeHtml(card.frontText)}</div><div class="listMeta">${escapeHtml(card.backText)}${card.exampleText?`<br>例文: ${escapeHtml(card.exampleText.slice(0,80))}${card.exampleText.length>80?"...":""}`:""}<br>次回: ${formatDateTime(state.dueAt)} / 復習 ${state.reviewCount||0}回 / 画像 ${(card.imageIds||[]).length}枚${card.suspended?`<br><strong>一時停止中</strong>`:""}</div></div><div class="row" style="justify-content:flex-end"><button class="ghost" style="flex:0 0 auto" onclick="speakCardFrontText('${card.id}')">発音</button><button class="ghost" style="flex:0 0 auto" onclick="openEditor('${card.id}')">編集</button></div></div>`;
    }

    function openEditor(id){
      appState.editorCardId=id;
      render();
    }

    function closeEditor(){
      appState.editorCardId=null;
      render();
    }

    function renderEditor(){
      const card=appState.cards.find(current=>current.id===appState.editorCardId);
      if(!card)return"";
      const imageRows=images=>images.map(image=>`<div class="listItem"><div><img class="cardImage cardImage--editor" src="${imageUrl(image)}" alt="${escapeHtml(image.name||"画像")}"/><div class="listMeta">${escapeHtml(image.name||"画像")} / ${image.side==="front"?"表面":"裏面"}</div></div><button class="danger" onclick="removeImage('${card.id}','${image.id}')">削除</button></div>`).join("");
      const frontImages=cardImages(card,"front"),backImages=cardImages(card,"back");
      return`<div class="modalBackdrop" onclick="if(event.target.className==='modalBackdrop')closeEditor();"><div class="modal"><div class="modalHeader"><h2>カード編集</h2><button class="secondary" onclick="closeEditor()">閉じる</button></div><label>表面テキスト（英語）</label><input id="editFront" type="text" value="${escapeHtml(card.frontText)}"/><div class="row" style="margin-top:10px"><button class="ghost" onclick="speakEditorFrontText()">入力中の英語を読み上げ</button></div><label>裏面テキスト（日本語）</label><input id="editBack" type="text" value="${escapeHtml(card.backText)}"/><label>例文（裏面に表示）</label><textarea id="editExample">${escapeHtml(card.exampleText||"")}</textarea><label>補足メモ（裏面に表示）</label><textarea id="editNote">${escapeHtml(card.noteText||"")}</textarea><div class="toggleLine"><div><strong>一時停止</strong><div class="small">オンにすると学習対象から外します。</div></div><input id="editSuspended" class="checkbox" type="checkbox" ${card.suspended?"checked":""}/></div><div class="row" style="margin:12px 0 18px"><button onclick="saveCardFromEditor('${card.id}')">保存</button><button class="danger" onclick="deleteCard('${card.id}')">削除</button></div><div class="card" style="box-shadow:none;margin:12px 0"><h3 style="margin-top:0">画像</h3><label>表面に画像を追加</label><input class="fileInput" type="file" accept="image/*" onchange="addImageToCard('${card.id}',this,'front')"/><label>裏面に画像を追加</label><input class="fileInput" type="file" accept="image/*" onchange="addImageToCard('${card.id}',this,'back')"/><h4>表面画像</h4>${frontImages.length?imageRows(frontImages):`<p class="small">表面画像はありません。</p>`}<h4>裏面画像</h4>${backImages.length?imageRows(backImages):`<p class="small">裏面画像はありません。</p>`}</div></div></div>`;
    }

    function renderCompletionModal(){
      if(!appState.completionModalState)return"";
      const completion=appState.completionModalState;
      return`<div class="modalBackdrop modalBackdrop--celebration" onclick="if(event.target.classList.contains('modalBackdrop--celebration'))closeCompletionModal();"><div class="modal celebrationModal"><div class="modalHeader"><h2>${escapeHtml(completion.title||"おめでとう")}</h2><button class="secondary" onclick="closeCompletionModal()">閉じる</button></div><div class="celebrationEyebrow">${escapeHtml(completion.eyebrow||"達成")}</div><div class="celebrationHeadline">${escapeHtml(completion.headline)}</div><p class="celebrationText">${escapeHtml(completion.body)}</p><div class="row">${(completion.pills||[]).map(pill=>`<span class="pill">${escapeHtml(pill)}</span>`).join("")}</div></div></div>`;
    }

    function renderHistory(){
      const logs=[...appState.logs].sort((left,right)=>new Date(right.reviewedAt)-new Date(left.reviewedAt)).slice(0,100);
      return`${renderStatsCard()}<div class="card"><h2 style="margin-top:0">学習履歴</h2>${logs.length?logs.map(log=>{const card=appState.cards.find(current=>current.id===log.cardId);return`<div class="listItem"><div><div class="listTitle">${escapeHtml(card?.frontText||"削除済みカード")}</div><div class="listMeta">${formatDateTime(log.reviewedAt)} / ${ratingLabels[log.rating]||log.rating}<br>間隔: ${log.previousIntervalDays||0}日 → ${log.nextIntervalDays||0}日</div></div></div>`}).join(""):`<div class="empty">履歴はまだありません。</div>`}</div><div class="card"><h2 style="margin-top:0">データ管理</h2><p class="small">学習データはこの端末のブラウザデータとして保存され、Google Drive同期を有効にするとDriveにも反映されます。</p><div class="row"><button class="ghost" onclick="exportData()">JSONバックアップ</button><button class="danger" onclick="resetAllData()">全データ削除</button></div></div>`;
    }

    function renderTabs(){
      const tabs=[["study","学習"],["import","インポート"],["cards","カード"],["history","履歴"],["settings","設定"]];
      return`<div class="tabs"><div class="tabInner">${tabs.map(([key,label])=>`<button class="tab ${appState.tab===key?"active":""}" onclick="setTab('${key}')">${label}</button>`).join("")}</div></div>`;
    }

    function render(){
      const root=document.getElementById("app");
      let main="";
      if(appState.tab==="study")main=renderStudy();
      if(appState.tab==="import")main=renderImport();
      if(appState.tab==="cards")main=renderCards();
      if(appState.tab==="history")main=renderHistory();
      if(appState.tab==="settings")main=renderSettings();
      root.innerHTML=`${renderAppHeader()}${renderMessages()}${main}${renderEditor()}${renderCompletionModal()}${renderTabs()}`;
    }

    Object.assign(window,{appState,render,setTab,importCsvFile,saveSyncSettings,saveNicknameSettings,saveGoogleDriveSettings,connectGoogleDrive,syncGoogleDrive,syncGoogleDriveFromForm,disconnectGoogleDrive,syncFromGas,testGasConnection,openGasUrlForCheck,copyGasUrl,syncFromPastedGasJson,runSelfTests,rateCurrentCard,skipCurrentCard,speakCardFrontText,speakCurrentCard,speakEditorFrontText,openEditor,closeEditor,closeCompletionModal,saveCardFromEditor,addImageToCard,removeImage,deleteCard,resetAllData,exportData});

    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").then(registration=>registration.update()).catch(error=>console.warn("Service Worker registration failed:",error)));
    }

    loadData().then(async()=>{
      render();
      startGoogleDriveAutoSync();
      await maybeAutoSyncFromGas();
      }).catch(error=>{
        console.error(error);
        appState.error=`データベースの初期化に失敗しました。\n${error.message||error}`;
        render();
      });
  </script>
</body>
</html>
